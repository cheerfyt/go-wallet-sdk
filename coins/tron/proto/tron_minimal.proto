// Minimal Tron protobuf definitions for signing transactions
// Contains only types required for transfer of TRX, TRC10 and TRC20 transaction building
//
// Source: https://github.com/tronprotocol/protocol/tree/9d65b1602ba5bae7491d49a5239717733eb5cab6/core
//
// Files used:
//   - Tron.proto (Transaction, Contract, authority, AccountId)
//   - contract/balance_contract.proto (TransferContract)
//   - contract/asset_issue_contract.proto (TransferAssetContract)
//   - contract/smart_contract.proto (TriggerSmartContract)
syntax = "proto3";

import "google/protobuf/any.proto";

package pb;

option go_package = "github.com/okx/go-wallet-sdk/coins/tron/pb";

// AccountId - used by authority
message AccountId {
  bytes name = 1;
  bytes address = 2;
}

// authority - used by Transaction.raw
message authority {
  AccountId account = 1;
  bytes permission_name = 2;
}

// Transaction - main transaction wrapper
message Transaction {
  // Contract types used for signing
  message Contract {
    enum ContractType {
      AccountCreateContract = 0;
      TransferContract = 1;
      TransferAssetContract = 2;
      VoteAssetContract = 3;
      VoteWitnessContract = 4;
      WitnessCreateContract = 5;
      AssetIssueContract = 6;
      WitnessUpdateContract = 8;
      ParticipateAssetIssueContract = 9;
      AccountUpdateContract = 10;
      FreezeBalanceContract = 11;
      UnfreezeBalanceContract = 12;
      WithdrawBalanceContract = 13;
      UnfreezeAssetContract = 14;
      UpdateAssetContract = 15;
      ProposalCreateContract = 16;
      ProposalApproveContract = 17;
      ProposalDeleteContract = 18;
      SetAccountIdContract = 19;
      CustomContract = 20;
      CreateSmartContract = 30;
      TriggerSmartContract = 31;
      GetContract = 32;
      UpdateSettingContract = 33;
      ExchangeCreateContract = 41;
      ExchangeInjectContract = 42;
      ExchangeWithdrawContract = 43;
      ExchangeTransactionContract = 44;
      UpdateEnergyLimitContract = 45;
      AccountPermissionUpdateContract = 46;
      ClearABIContract = 48;
      UpdateBrokerageContract = 49;
      ShieldedTransferContract = 51;
      MarketSellAssetContract = 52;
      MarketCancelOrderContract = 53;
      FreezeBalanceV2Contract = 54;
      UnfreezeBalanceV2Contract = 55;
      WithdrawExpireUnfreezeContract = 56;
      DelegateResourceContract = 57;
      UnDelegateResourceContract = 58;
      CancelAllUnfreezeV2Contract = 59;
    }
    ContractType type = 1;
    google.protobuf.Any parameter = 2;
    bytes provider = 3;
    bytes ContractName = 4;
    int32 Permission_id = 5;
  }

  message raw {
    bytes ref_block_bytes = 1;
    int64 ref_block_num = 3;
    bytes ref_block_hash = 4;
    int64 expiration = 8;
    repeated authority auths = 9;
    // data not used
    bytes data = 10;
    //only support size = 1,  repeated list here for extension
    repeated Contract contract = 11;
    // scripts not used
    bytes scripts = 12;
    int64 timestamp = 14;
    int64 fee_limit = 18;
  }

  raw raw_data = 1;
  repeated bytes signature = 2;
}

// ============================================================================
// Contract types (from separate .proto files in the Tron protocol repository)
// ============================================================================

// TransferContract - TRX transfer
// Source: core/contract/balance_contract.proto
message TransferContract {
  bytes owner_address = 1;
  bytes to_address = 2;
  int64 amount = 3;
}

// TransferAssetContract - TRC10 token transfer
// Source: core/contract/asset_issue_contract.proto
message TransferAssetContract {
  bytes asset_name = 1;
  bytes owner_address = 2;
  bytes to_address = 3;
  int64 amount = 4;
}

// TriggerSmartContract - TRC20 token transfer and smart contract call
// Source: core/contract/smart_contract.proto
message TriggerSmartContract {
  bytes owner_address = 1;
  bytes contract_address = 2;
  int64 call_value = 3;
  bytes data = 4;
  int64 call_token_value = 5;
  int64 token_id = 6;
}

